name: Deploy Website

on:
  push:
    branches: ["main"] # Replace with "master" if that's your branch name

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Change this to './dist' or './build' if you use React/Vue

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
